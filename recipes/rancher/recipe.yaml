# The app can be reached at https://rancher.<FQDN>:8443
{% set hostname = 'rancher.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at: https://rancher.<IP>.sslip.io:8443
# {% set hostname = 'rancher.' ~ ipaddr() ~ '.sslip.io' %}
# Change the following variables to adapt the recipe to your needs.
{% set bootstrapPassword = 'rancher' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: cattle-system
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: rancher
  namespace: kube-system
  labels:
    app.kubernetes.io/name: rancher
spec:
  repo: https://releases.rancher.com/server-charts/stable
  chart: rancher
  targetNamespace: cattle-system
  valuesContent: |-
    bootstrapPassword: "{{ bootstrapPassword }}"
    hostname: "rancher.{{ fqdn() }}"
    replicas: 1
    ingress:
      enabled: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rancher-websecure
  namespace: cattle-system
  labels:
    app.kubernetes.io/name: rancher
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: rancher
          port: 80
  tls: {}
