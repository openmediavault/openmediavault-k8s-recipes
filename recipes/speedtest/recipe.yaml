# The app can be reached at https://speedtest.<FQDN>:8443
{% set hostname = 'speedtest.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://speedtest.<IP>.sslip.io:8443
# {% set hostname = 'speedtest.' ~ ipaddr() ~ '.sslip.io' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: speedtest-app
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: speedtest
  namespace: kube-system
  labels:
    app.kubernetes.io/name: speedtest
spec:
  repo: https://openspeedtest.github.io/Helm-chart/
  chart: openspeedtest
  targetNamespace: speedtest-app
  valuesContent: |-
    fullnameOverride: speedtest
    service:
      type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: speedtest-websecure
  namespace: speedtest-app
  labels:
    app.kubernetes.io/name: speedtest
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: speedtest
          port: 3000
  tls: {}
