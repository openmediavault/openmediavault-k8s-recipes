# The app can be reached at https://scrutiny.<FQDN>:8443
{% set hostname = 'scrutiny.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://scrutiny.<IP>.sslip.io:8443
# {% set hostname = 'scrutiny.' ~ ipaddr() ~ '.sslip.io' %}
# Change the following variables to adapt the recipe to your needs.
# Insert the name of the shared folder you want to use. Make sure the
# configured UID/GID the container is running with has access to that
# directory.
{% set dataSharedFolderName = '<MODIFY>' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: scrutiny-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: scrutiny
  name: scrutiny
  namespace: scrutiny-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: scrutiny
      app.kubernetes.io/name: scrutiny
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: scrutiny
        app.kubernetes.io/name: scrutiny
    spec:
      containers:
        - image: ghcr.io/analogj/scrutiny:latest-omnibus
          imagePullPolicy: IfNotPresent
          name: scrutiny
          env:
            - name: TZ
              value: {{ tz() }}
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_RAWIO
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8086
              protocol: TCP
          volumeMounts:
            - name: dev
              mountPath: /dev
              readOnly: true
            - name: udev
              mountPath: /run/udev
              readOnly: true
            - name: config
              mountPath: /opt/scrutiny/config
            - name: influxdb
              mountPath: /opt/scrutiny/influxdb
      restartPolicy: Always
      volumes:
        - name: dev
          hostPath:
            type: Directory
            path: /dev
        - name: udev
          hostPath:
            type: Directory
            path: /run/udev
        - name: config
          hostPath:
            type: DirectoryOrCreate
            path: {{ sharedfolder_path(dataSharedFolderName) }}/config
        - name: influxdb
          hostPath:
            type: DirectoryOrCreate
            path: {{ sharedfolder_path(dataSharedFolderName) }}/influxdb
---
apiVersion: v1
kind: Service
metadata:
  name: scrutiny
  namespace: scrutiny-app
  labels:
    app.kubernetes.io/name: scrutiny
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: influxdb
      protocol: TCP
      port: 8086
      targetPort: 8086
  selector:
    app.kubernetes.io/instance: scrutiny
    app.kubernetes.io/name: scrutiny
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: scrutiny-websecure
  namespace: scrutiny-app
  labels:
    app.kubernetes.io/name: scrutiny
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: scrutiny
          port: 8080
  tls: {}
