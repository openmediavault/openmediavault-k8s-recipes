# The app can be reached at https://kopia.<FQDN>:8443
{% set hostname = 'kopia.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://kopia.<IP>.sslip.io:8443
# {% set hostname = 'kopia.' ~ ipaddr() ~ '.sslip.io' %}
# Change the following variables to adapt the recipe to your needs.
{% set serverUsername = 'admin' %}
{% set serverPassword = 'admin' %}
# Insert the name of the shared folders you want to use. Make sure the
# configured UID/GID the container is running with has access to that
# directory.
{% set repositorySharedFolderName = '<MODIFY>' %}
{% set appDataSharedFolderName = '<MODIFY>' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: kopia-app
---
apiVersion: v1
kind: Secret
metadata:
  name: kopia
  namespace: kopia-app
  labels:
    app.kubernetes.io/name: kopia
stringData:
  server-password: "{{ serverPassword }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia
  namespace: kopia-app
  labels:
    app.kubernetes.io/name: kopia
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: kopia
      app.kubernetes.io/name: kopia
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: kopia
        app.kubernetes.io/name: kopia
    spec:
      containers:
        - name: kopia
          image: kopia/kopia:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              /bin/kopia server start \
                --address=0.0.0.0:51515 \
                --disable-csrf-token-checks \
                --insecure \
                --server-username={{ serverUsername }} \
                --server-password="${KOPIA_SERVER_PASSWORD}"
          env:
            - name: TZ
              value: "{{ tz() }}"
            - name: KOPIA_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kopia
                  key: server-password
          ports:
            - containerPort: 51515
              name: http
              protocol: TCP
          volumeMounts:
            - name: repository
              mountPath: /repository
            - name: config
              mountPath: /app/config
            - name: cache
              mountPath: /app/cache
            - name: logs
              mountPath: /app/logs
      restartPolicy: Always
      volumes:
        - name: repository
          hostPath:
            path: {{ sharedfolder_path(repositorySharedFolderName) }}
            type: Directory
        - name: config
          hostPath:
            path: {{ sharedfolder_path(appDataSharedFolderName) }}/config
            type: DirectoryOrCreate
        - name: cache
          hostPath:
            path: {{ sharedfolder_path(appDataSharedFolderName) }}/cache
            type: DirectoryOrCreate
        - name: logs
          hostPath:
            path: {{ sharedfolder_path(appDataSharedFolderName) }}/logs
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: kopia
  namespace: kopia-app
  labels:
    app.kubernetes.io/name: kopia
spec:
  type: ClusterIP
  ports:
    - port: 51515
      targetPort: 51515
      protocol: TCP
  selector:
    app.kubernetes.io/instance: kopia
    app.kubernetes.io/name: kopia
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kopia-websecure
  namespace: kopia-app
  labels:
    app.kubernetes.io/name: kopia
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: kopia
          port: 51515
  tls: {}
