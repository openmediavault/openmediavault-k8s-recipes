# The app can be reached at https://adguard-home.<FQDN>:8443
{% set hostname = 'adguard-home.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://adguard-home.<IP>.sslip.io:8443
# {% set hostname = 'adguard-home.' ~ ipaddr() ~ '.sslip.io' %}
# Change the following variables to adapt the recipe to your needs.
{% set configSharedFolderName = '<MODIFY>' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: adguard-home-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: adguard-home
  name: adguard-home
  namespace: adguard-home-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: adguard-home
      app.kubernetes.io/name: adguard-home
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: adguard-home
        app.kubernetes.io/name: adguard-home
    spec:
      containers:
        - image: docker.io/adguard/adguardhome:latest
          imagePullPolicy: IfNotPresent
          name: adguard-home
          args:
            - "--no-check-update"
            - "--web-addr"
            - "0.0.0.0:80"
            - "-c"
            - "/opt/adguardhome/conf/AdGuardHome.yaml"
            - "-w"
            - "/opt/adguardhome/work"
          env:
            - name: TZ
              value: {{ tz() }}
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 67
              protocol: UDP
            - containerPort: 68
              protocol: UDP
            - containerPort: 80
              protocol: TCP
            - containerPort: 853
              protocol: TCP
            - containerPort: 853
              protocol: UDP
            - containerPort: 784
              protocol: UDP
            - containerPort: 8853
              protocol: UDP
            - containerPort: 5443
              protocol: TCP
            - containerPort: 5443
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /opt/adguardhome/work
              subPath: work
            - name: config
              mountPath: /opt/adguardhome/conf
              subPath: conf
      restartPolicy: Always
      volumes:
        - name: config
          hostPath:
            type: Directory
            # Insert the name of the shared folder you want to use.
            # Make sure the configured UID/GID the container is running
            # with has access to that directory.
            path: {{ sharedfolder_path(configSharedFolderName) }}
---
# This Service is intentionally split into two separate Services (TCP and UDP)
# to work around a known Kubernetes bug where applying a Service with duplicate
# port numbers (same port, different protocols) silently drops one of the entries
# when using `kubectl apply` (client-side apply).
# See: https://github.com/kubernetes/kubernetes/issues/105610
apiVersion: v1
kind: Service
metadata:
  name: adguard-home-tcp
  namespace: adguard-home-app
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  type: ClusterIP
  ports:
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
    - name: web-interface
      protocol: TCP
      port: 80
      targetPort: 80
    - name: dot
      protocol: TCP
      port: 853
      targetPort: 853
    - name: dnscrypt-tcp
      protocol: TCP
      port: 5443
      targetPort: 5443
  selector:
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/name: adguard-home
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-home-udp
  namespace: adguard-home-app
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  type: ClusterIP
  ports:
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
    - name: dhcp-server
      protocol: UDP
      port: 67
      targetPort: 67
    - name: dhcp-client
      protocol: UDP
      port: 68
      targetPort: 68
    - name: doq
      protocol: UDP
      port: 784
      targetPort: 784
    - name: dnstls
      protocol: UDP
      port: 853
      targetPort: 853
    - name: dnstls-alt
      protocol: UDP
      port: 8853
      targetPort: 8853
    - name: dnscrypt-udp
      protocol: UDP
      port: 5443
      targetPort: 5443
  selector:
    app.kubernetes.io/instance: adguard-home
    app.kubernetes.io/name: adguard-home
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard-home-websecure
  namespace: adguard-home-app
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: adguard-home-tcp
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: adguard-home-dns-tcp
  namespace: adguard-home-app
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  entryPoints:
    - dns-tcp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: adguard-home-tcp
          port: dns-tcp
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteUDP
metadata:
  name: adguard-home-dns-udp
  namespace: adguard-home-app
  labels:
    app.kubernetes.io/name: adguard-home
spec:
  entryPoints:
    - dns-udp
  routes:
    - services:
      - name: adguard-home-udp
        port: dns-udp
