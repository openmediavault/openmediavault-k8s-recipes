# The app can be reached at https://openwebui.<FQDN>:8443
{% set hostname = 'openwebui.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://openwebui.<IP>.sslip.io:8443
# {% set hostname = 'openwebui.' ~ ipaddr() ~ '.sslip.io' %}
# Note, this recipe requires the Ollama recipe to be deployed and running.
# Change the following variables to adapt the recipe to your needs.
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: openwebui-app
---
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: openwebui
  namespace: kube-system
  labels:
    app.kubernetes.io/name: openwebui
spec:
  repo: https://helm.openwebui.com/
  chart: open-webui
  targetNamespace: openwebui-app
  valuesContent: |-
    ollama:
      enabled: false
    ollamaUrls:
      - http://ollama.ollama-app.svc.cluster.local:11434
    pipelines:
      enabled: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui-websecure
  namespace: openwebui-app
  labels:
    app.kubernetes.io/name: openwebui
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: open-webui
          port: 80
  tls: {}
