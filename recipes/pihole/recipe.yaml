# The app can be reached at https://pihole.<FQDN>:8443/admin/login
{% set hostname = 'pihole.' ~ fqdn() %}
# Alternatively, use sslip.io if you don't have a local DNS server.
# The app can then be reached at https://pihole.<IP>.sslip.io:8443
# {% set hostname = 'pihole.' ~ ipaddr() ~ '.sslip.io' %}
# Change the following variables to adapt the recipe to your needs.
{% set password = 'pihole' %}
# Insert the name of the shared folder you want to use. Make sure the
# configured UID/GID the container is running with has access to that
# directory.
{% set configSharedFolderName = '<MODIFY>' %}
# !!! Only modify the following manifest if you need to make custom changes. !!!
---
apiVersion: v1
kind: Namespace
metadata:
  name: pihole-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: pihole
  name: pihole
  namespace: pihole-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: pihole
      app.kubernetes.io/name: pihole
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: pihole
        app.kubernetes.io/name: pihole
    spec:
      containers:
        - image: docker.io/pihole/pihole:latest
          imagePullPolicy: IfNotPresent
          name: pihole
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
            - containerPort: 80
              protocol: TCP
            - containerPort: 67
              protocol: UDP
            - containerPort: 68
              protocol: UDP
            - containerPort: 123
              protocol: UDP
          env:
            - name: TZ
              value: {{ tz() }}
            - name: FTLCONF_dns_listeningMode
              value: ALL
          envFrom:
            - secretRef:
                name: pihole
          volumeMounts:
            - name: config
              mountPath: /etc/pihole
      restartPolicy: Always
      volumes:
        - name: config
          hostPath:
            type: Directory
            # Insert the name of the shared folder you want to use.
            # Make sure the configured UID/GID the container is running
            # with has access to that directory.
            path: {{ sharedfolder_path(configSharedFolderName) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: pihole
  namespace: pihole-app
  labels:
    app.kubernetes.io/name: pihole
stringData:
  FTLCONF_webserver_api_password: {{ password }}
---
apiVersion: v1
kind: Service
metadata:
  name: pihole
  namespace: pihole-app
  labels:
    app.kubernetes.io/name: pihole
spec:
  type: ClusterIP
  ports:
    - name: dns-tcp
      protocol: TCP
      port: 53
      targetPort: 53
    - name: dns-udp
      protocol: UDP
      port: 53
      targetPort: 53
    - name: web-interface
      protocol: TCP
      port: 80
      targetPort: 80
    - name: dhcp-server
      protocol: UDP
      port: 67
      targetPort: 67
    - name: dhcp-client
      protocol: UDP
      port: 68
      targetPort: 68
    - name: ntp
      protocol: UDP
      port: 123
      targetPort: 123
  selector:
    app.kubernetes.io/instance: pihole
    app.kubernetes.io/name: pihole
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-websecure
  namespace: pihole-app
  labels:
    app.kubernetes.io/name: pihole
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ hostname }}`)
      kind: Rule
      services:
        - name: pihole
          port: 80
  tls: {}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: pihole-dns-tcp
  namespace: pihole-app
  labels:
    app.kubernetes.io/name: pihole
spec:
  entryPoints:
    - dns-tcp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: pihole
          port: dns-tcp
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteUDP
metadata:
  name: pihole-dns-udp
  namespace: pihole-app
  labels:
    app.kubernetes.io/name: pihole
spec:
  entryPoints:
    - dns-udp
  routes:
    - services:
      - name: pihole
        port: dns-udp
